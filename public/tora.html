<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ねこタロット - ねこたちの格言</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon-4.png" type="image/png">
<meta name="theme-color" content="#1a1025">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@400;600&display=swap');
  :root{--bg:#1a1025;--card-bg:#2d1f3d;--accent:#e8b4f8;--accent2:#f5d76e;--accent3:#a8e6cf;--text:#f0e6ff;--text-muted:#b09ec0;--border:#5a3d7a;--glow:rgba(232,180,248,0.3);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(90,40,120,0.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(40,20,80,0.5) 0%,transparent 50%);pointer-events:none;z-index:0;}
  .stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .star{position:absolute;background:white;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:1;transform:scale(1.3);}}
  .container{position:relative;z-index:1;max-width:500px;margin:0 auto;padding:20px 16px 60px;}
  header{text-align:center;padding:24px 0 20px;}
  .cat-emoji{font-size:52px;display:block;margin-bottom:8px;animation:float 4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
  h1{font-family:'Shippori Mincho',serif;font-size:clamp(20px,5vw,30px);color:var(--accent2);letter-spacing:0.1em;text-shadow:0 0 20px rgba(245,215,110,0.3);margin-bottom:4px;}
  .subtitle{font-size:13px;color:var(--text-muted);letter-spacing:0.15em;}
  .btn{width:100%;padding:14px;border-radius:12px;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:0.08em;transition:all 0.3s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-main{background:linear-gradient(135deg,#d97706,#b45309);border:none;color:white;}
  .btn-main:hover:not(:disabled){background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 30px rgba(245,158,11,0.4);transform:translateY(-2px);}
  .btn:disabled{opacity:0.45;cursor:not-allowed;transform:none !important;}
  .btn-reset{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:13px;}
  .btn-reset:hover{border-color:var(--accent2);color:var(--accent2);}
  .btn-home{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-size:13px;margin-bottom:16px;}
  .btn-home:hover{border-color:var(--accent);color:var(--accent);}

  .tora-intro{background:var(--card-bg);border:1px solid rgba(245,215,110,0.3);border-radius:16px;padding:20px;margin-bottom:20px;display:flex;gap:16px;align-items:center;}
  .tora-icon{font-size:52px;flex-shrink:0;}
  .tora-desc{font-size:13px;color:var(--text-muted);line-height:1.7;}
  .tora-desc strong{color:var(--accent2);}

  .result-card{background:var(--card-bg);border:1px solid rgba(245,215,110,0.5);border-radius:20px;padding:28px 24px;box-shadow:0 0 40px rgba(245,215,110,0.2);display:none;margin-bottom:16px;}
  .result-card.show{display:block;}
  .tora-big{font-size:72px;text-align:center;margin-bottom:16px;animation:bounce2 2s ease-in-out infinite;}
  @keyframes bounce2{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .kotowaza{
    font-family:'Shippori Mincho',serif;
    font-size:20px;color:var(--accent2);
    text-align:center;line-height:1.6;
    padding:16px;margin-bottom:16px;
    background:rgba(245,215,110,0.08);
    border-radius:12px;border:1px solid rgba(245,215,110,0.2);
    letter-spacing:0.05em;
  }
  .explanation{font-size:14px;line-height:1.9;color:var(--text);margin-bottom:16px;}
  .tora-advice{
    background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);
    border-radius:12px;padding:14px;
    font-size:13px;color:var(--accent2);
    line-height:1.7;
  }
  .tora-advice strong{display:block;margin-bottom:6px;font-size:12px;color:rgba(245,158,11,0.8);}

  .loading{text-align:center;padding:32px;color:var(--text-muted);font-size:14px;}
  .loading-cats{font-size:28px;letter-spacing:8px;animation:bounce 1s ease-in-out infinite;display:block;margin-bottom:12px;}
  @keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .error-msg{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.4);border-radius:10px;padding:11px 14px;color:#fca5a5;font-size:13px;margin-top:8px;display:none;}
  .error-msg.show{display:block;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="container">
  <header>
    <span class="cat-emoji">🐱</span>
    <h1>ねこたちの格言</h1>
    <p class="subtitle">〜 秘密のアドバイス 〜</p>
  </header>
  <a href="/menu.html"><button class="btn btn-home">← メニューに戻る</button></a>

  <div class="tora-intro">
    <div class="tora-icon">🐱</div>
    <div class="tora-desc">
      <strong>ねこたち</strong>は古今東西の知恵を持つ猫の賢者たち。今日のあなたに必要な言葉を授けてくれます。
    </div>
  </div>

  <button class="btn btn-main" id="btnAsk" onclick="askTora()">🐱 ねこたちに教えてもらう</button>

  <div class="result-card" id="resultCard">
    <div id="toraContent"></div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <button class="btn btn-reset" id="btnReset" onclick="resetAll()" style="display:none">🔄 もう一度聞く</button>
</div>
<script>
async function askTora(){
  const btnAsk=document.getElementById('btnAsk');
  btnAsk.disabled=true;
  const resultCard=document.getElementById('resultCard');
  const toraContent=document.getElementById('toraContent');
  const errorMsg=document.getElementById('errorMsg');
  errorMsg.classList.remove('show');
  resultCard.classList.add('show');
  toraContent.innerHTML=`<div class="loading"><span class="loading-cats">🐱 🌙 ✨</span>ねこたちが考えているにゃ…</div>`;

  const today=new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'long'});
  const prompt=`あなたは古今東西の知恵を持つ猫の賢者たち「ねこたち」の代弁者です。語尾に「〜にゃ」「〜だにゃ」など猫らしい語尾を使います。

今日（${today}）、訪れた人に格言とアドバイスを授けます。

以下のJSON形式で返してください（JSONのみ）：
{
  "kotowaza": "今日の格言（猫らしく深みのある言葉で、20〜30文字）",
  "explanation": "その格言の意味と今日の状況への解釈（120文字程度、「〜にゃ」語尾で）",
  "action": "今日すべき具体的な行動（40文字以内、「〜にゃ」語尾で）",
  "secret": "ねこたちだけが知る秘密のひとこと（40文字以内、神秘的に）"
}`;

  try{
    const res=await fetch('/api/reading',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const clean=text.replace(/```json|```/g,'').trim();
    const tora=JSON.parse(clean);
    toraContent.innerHTML=`
      <div class="tora-big">🐱</div>
      <div class="kotowaza">「${tora.kotowaza}」</div>
      <p class="explanation">${tora.explanation}</p>
      <div class="tora-advice">
        <strong>🐾 今日の行動</strong>
        ${tora.action}
      </div>
      <div class="tora-advice" style="margin-top:10px;background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.3)">
        <strong style="color:rgba(196,181,253,0.8)">🌙 秘密のひとこと</strong>
        <span style="color:var(--accent)">${tora.secret}</span>
      </div>
    `;
    document.getElementById('btnReset').style.display='flex';
  }catch(err){
    resultCard.classList.remove('show');
    errorMsg.textContent=`エラーが発生しましたにゃ…: ${err.message}`;
    errorMsg.classList.add('show');
    btnAsk.disabled=false;
  }
}

function resetAll(){
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('btnReset').style.display='none';
  document.getElementById('btnAsk').disabled=false;
}

function createStars(){const c=document.getElementById('stars');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*2.5+0.5;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*4).toFixed(1)}s;`;c.appendChild(s);}}
createStars();
</script>
</body>
</html>
